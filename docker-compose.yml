services:
  directus:
    image: directus/directus:latest
    ports:
      - 8055:8055
    volumes:
      - ./uploads:/directus/uploads
      - ./database:/directus/database
    restart: always
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "--tries=1", "--spider", "http://directus:8055/server/health"]
      interval: 10s
      timeout: 30s
      retries: 3
    environment:
      KEY: ${KEY}
      SECRET: ${SECRET}

      DB_CLIENT: 'sqlite3'
      DB_FILENAME: '/directus/database/bus.db'

      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}

  app:
    build: 
      context: .
      dockerfile: ./dockerfiles/Dockerfile
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
      - ./.env:/app/.env
    depends_on:
      directus:
        condition: service_healthy
    
